<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrin — Yeni Kayıt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16181d; --paper:#f4f1ea; --card:#fbfaf6;
    --line:#d9d3c5; --muted:#6b6457; --amber:#d96f32; --deep:#1f2a44;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  header{border-bottom:1.5px solid var(--ink);padding:20px clamp(16px,4vw,40px);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .brand{font-family:Fraunces,serif;font-weight:900;font-size:clamp(22px,4vw,26px);letter-spacing:-.02em;line-height:1}
  .brand small{font-family:Inter;font-weight:500;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:block;margin-top:4px}
  nav{display:flex;gap:8px}
  nav a{font-size:13px;font-weight:600;padding:8px 14px;border:1.5px solid var(--ink);border-radius:999px;white-space:nowrap}
  nav a.active{background:var(--ink);color:var(--paper)}

  .wrap{max-width:560px;margin:0 auto;padding:clamp(28px,5vw,44px) clamp(16px,4vw,28px)}
  h1{font-family:Fraunces,serif;font-weight:900;font-size:clamp(28px,6vw,44px);letter-spacing:-.02em;margin-bottom:6px;line-height:1.05}
  .sub{color:var(--muted);margin-bottom:30px;font-size:15px}

  .field{margin-bottom:22px}
  label{display:block;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  input,select{width:100%;font-family:Inter;font-size:16px;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;background:#fff;transition:.12s}
  input:focus,select:focus{outline:none;border-color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  button.save{width:100%;font-family:Inter;font-size:16px;font-weight:600;padding:15px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);cursor:pointer;transition:.12s;margin-top:8px}
  button.save:hover{background:var(--deep)}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--deep);color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--amber)}
  @media(max-width:480px){.two{grid-template-columns:1fr;gap:0}}
</style>
</head>
<body>
<header>
  <div class="brand">Vitrin<small>Influencer Kataloğu</small></div>
  <nav>
    <a href="/">Katalog</a>
    <a href="/ekle.html" class="active">Yeni Kayıt</a>
  </nav>
</header>

<div class="wrap">
  <h1>Yeni kayıt ekle</h1>
  <p class="sub">Kataloğa eklemek istediğin influencer bilgilerini gir.</p>

  <div class="field">
    <label>Kullanıcı adı</label>
    <input id="username" placeholder="ornek_kullanici" autocomplete="off">
  </div>

  <div class="field">
    <label>Kategori</label>
    <select id="category"></select>
  </div>

  <div class="two">
    <div class="field">
      <label>Takipçi</label>
      <input id="followers" type="number" min="0" placeholder="125000">
      <div class="hint">Sayı olarak, örn. 125000</div>
    </div>
    <div class="field">
      <label>Etkileşim (%)</label>
      <input id="engagement" type="number" min="0" max="100" step="0.1" placeholder="72.5">
      <div class="hint">40–99 arası</div>
    </div>
  </div>

  <div class="field">
    <label>Mail</label>
    <input id="email" type="email" placeholder="iletisim@mail.com" autocomplete="off">
  </div>

  <button class="save" id="save">Kataloğa ekle</button>
</div>

<div class="toast" id="toast"></div>

<script>
async function loadCats(){
  const cats=await (await fetch('/api/categories')).json();
  document.getElementById('category').innerHTML=
    cats.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');
}
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(err?' err':'');
  setTimeout(()=>t.className='toast',2200);
}
document.getElementById('save').onclick=async()=>{
  const body={
    username:username.value.trim(),
    category:category.value,
    followers:followers.value,
    engagement:engagement.value,
    email:email.value.trim()
  };
  if(!body.username||!body.followers||!body.engagement||!body.email){
    return toast('Lütfen tüm alanları doldur.',true);
  }
  const r=await fetch('/api/influencers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){
    toast('Kayıt eklendi ✓');
    ['username','followers','engagement','email'].forEach(id=>document.getElementById(id).value='');
  }else{
    const e=await r.json();toast(e.error||'Bir hata oldu.',true);
  }
};
loadCats();
</script>
</body>
</html>
